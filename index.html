<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>faruSpark - AI Video Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #6f21a8, #0f172a);
            color: #fff;
            min-height: 100vh;
        }
        
        .navbar {
            background: linear-gradient(90deg, #1e293b, #6f21a8);
            border-bottom: 3px solid #06b6d4;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar-title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #06b6d4, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            color: #06b6d4;
        }
        
        .nav-btn.active {
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }
        
        .nav-btn.pro {
            background: linear-gradient(90deg, #ec4899, #f43f5e);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            color: #fff;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        .section {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }
        
        .section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .title {
            font-size: 56px;
            font-weight: bold;
            background: linear-gradient(90deg, #06b6d4, #ec4899, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #c084fc;
            margin-bottom: 40px;
        }
        
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }
        
        .btn {
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #06b6d4, #00d9ff);
            color: #0f172a;
        }
        
        .btn-secondary {
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: #fff;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature-card {
            border-radius: 16px;
            padding: 24px;
            border: 2px solid;
            background: rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
        }

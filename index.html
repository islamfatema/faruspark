<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>faruSpark - AI Video Editor for TikTok, Instagram, YouTube & Facebook</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #fff;
        }
        
        .navbar {
            background: linear-gradient(90deg, #1e293b, #6f21a8);
            border-bottom: 3px solid #06b6d4;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
        }
        
        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar-title {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #06b6d4, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .nav-button.active {
            color: #06b6d4;
        }
        
        .nav-button.pro {
            background: linear-gradient(90deg, #ec4899, #f43f5e);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .home-section {
            background: linear-gradient(135deg, #0f172a, #6f21a8, #0f172a);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }
        
        .home-title {
            font-size: 56px;
            font-weight: bold;
            background: linear-gradient(90deg, #06b6d4, #ec4899, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        
        .home-subtitle {
            font-size: 18px;
            color: #c084fc;
            margin-bottom: 32px;
        }
        
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #06b6d4, #00d9ff);
            color: #0f172a;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature-card {
            border-radius: 16px;
            padding: 24px;
            border: 2px solid;
            background: rgba(0, 0, 0, 0.1);
        }
        
        .feature-card.cyan {
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }
        
        .feature-card.pink {
            border-color: #ec4899;
            background: rgba(236, 72, 153, 0.1);
        }
        
        .feature-card.purple {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }
        
        .feature-card.green {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        
        .feature-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        
        .feature-title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .feature-desc {
            font-size: 13px;
        }
        
        .editor-section {
            background: linear-gradient(135deg, #0f172a, #4c1d95, #0f172a);
            min-height: 100vh;
            padding: 24px;
        }
        
        .upload-area {
            max-width: 1000px;
            margin: 0 auto;
            background: linear-gradient(135deg, #6f21a8, #a855f7);
            border: 4px dashed #06b6d4;
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
        }
        
        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .upload-title {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        .upload-desc {
            color: #06b6d4;
            font-size: 16px;
        }
        
        .hidden-input {
            display: none;
        }
        
        .pricing-section {
            background: linear-gradient(135deg, #0f172a, #166534, #0f172a);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .pricing-title {
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            margin-bottom: 12px;
        }
        
        .pricing-subtitle {
            color: #10b981;
            margin-bottom: 40px;
            font-size: 16px;
            text-align: center;
        }
        
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .price-card {
            border: 3px solid;
            padding: 32px;
            border-radius: 12px;
            background: linear-gradient(135deg, #1e3a1f, #134e4a);
        }
        
        .price-card.pro {
            background: linear-gradient(135deg, #7c2d12, #5b21b6);
            border-color: #ec4899;
            transform: scale(1.05);
        }
        
        .price-card.cyan {
            border-color: #06b6d4;
        }
        
        .popular-badge {
            background: #ef4444;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 16px;
            display: inline-block;
        }
        
        .price-card-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
        }
        
        .price-amount {
            font-size: 36px;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 8px;
        }
        
        .price-card.cyan .price-amount {
            color: #06b6d4;
        }
        
        .price-period {
            color: #10b981;
            font-size: 12px;
            margin-bottom: 24px;
        }
        
        .price-list {
            text-align: left;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .price-list li {
            color: #fff;
            margin-bottom: 8px;
            list-style: none;
        }
        
        .price-button {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
        }
        
        .price-button.free {
            background: #06b6d4;
            color: #0f172a;
        }
        
        .price-button.pro {
            background: linear-gradient(90deg, #ec4899, #f43f5e);
        }
        
        .footer {
            background: linear-gradient(90deg, #0f172a, #4c1d95);
            border-top: 3px solid #ec4899;
            padding: 32px 20px;
            text-align: center;
            margin-top: 60px;
        }
        
        .footer-text {
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .footer-subtext {
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function FaruSpark() {
            const [activeTab, setActiveTab] = useState('home');
            const [isPro, setIsPro] = useState(false);

            const HomeTab = () => (
                <div className="home-section">
                    <div className="container">
                        <h1 className="home-title">Create Stunning Videos Instantly</h1>
                        <p className="home-subtitle">AI-powered video editor for TikTok, Instagram, YouTube & Facebook</p>
                        
                        <div className="button-group">
                            <button className="btn-primary" onClick={() => setActiveTab('editor')}>
                                🎬 Start Editing
                            </button>
                            {!isPro && (
                                <button className="btn-secondary" onClick={() => setActiveTab('pricing')}>
                                    ⭐ Go Pro
                                </button>
                            )}
                        </div>

                        <div className="features-grid">
                            <div className="feature-card cyan">
                                <div className="feature-icon">🤖</div>
                                <h3 className="feature-title">AI Subtitles</h3>
                                <p className="feature-desc" style={{color: '#06b6d4'}}>Auto-generate subtitles</p>
                            </div>
                            <div className="feature-card pink">
                                <div className="feature-icon">🎵</div>
                                <h3 className="feature-title">Music Library</h3>
                                <p className="feature-desc" style={{color: '#ec4899'}}>1000+ royalty-free tracks</p>
                            </div>
                            <div className="feature-card purple">
                                <div className="feature-icon">🎨</div>
                                <h3 className="feature-title">Templates</h3>
                                <p className="feature-desc" style={{color: '#a855f7'}}>Platform-optimized layouts</p>
                            </div>
                            <div className="feature-card green">
                                <div className="feature-icon">⚡</div>
                                <h3 className="feature-title">Lightning Fast</h3>
                                <p className="feature-desc" style={{color: '#10b981'}}>No lag editing</p>
                            </div>
                            <div className="feature-card" style={{borderColor: '#fbbf24', background: 'rgba(251, 191, 36, 0.1)'}}>
                                <div className="feature-icon">📱</div>
                                <h3 className="feature-title">All Platforms</h3>
                                <p className="feature-desc" style={{color: '#fbbf24'}}>TikTok, Instagram, YouTube</p>
                            </div>
                            <div className="feature-card" style={{borderColor: '#3b82f6', background: 'rgba(59, 130, 246, 0.1)'}}>
                                <div className="feature-icon">✂️</div>
                                <h3 className="feature-title">Pro Effects</h3>
                                <p className="feature-desc" style={{color: '#3b82f6'}}>20+ filters & effects</p>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const EditorTab = () => (
                <div className="editor-section">
                    <div className="container">
                        <div className="upload-area">
                            <label style={{cursor: 'pointer', display: 'block'}}>
                                <div className="upload-icon">📹</div>
                                <h2 className="upload-title">Upload Your Video</h2>
                                <p className="upload-desc">Drag & drop or click to select (MP4, MOV, WebM, AVI)</p>
                                <input type="file" accept="video/*" className="hidden-input" />
                            </label>
                        </div>
                        <p style={{marginTop: '40px', color: '#06b6d4', textAlign: 'center'}}>Coming soon: Full video editing features!</p>
                    </div>
                </div>
            );

            const PricingTab = () => (
                <div className="pricing-section">
                    <div className="container">
                        <h1 className="pricing-title">💰 Simple Pricing</h1>
                        <p className="pricing-subtitle">Choose your plan</p>

                        <div className="pricing-grid">
                            <div className="price-card cyan">
                                <h2 className="price-card-title">Free</h2>
                                <div className="price-amount">$0<span style={{fontSize: '16px'}}>/mo</span></div>
                                <ul className="price-list">
                                    <li>✓ 5 videos/month</li>
                                    <li>✓ 480p export</li>
                                    <li>✓ Basic filters</li>
                                    <li>✓ 30 free tracks</li>
                                    <li>✗ Unlimited videos</li>
                                </ul>
                                <button className="price-button free">Get Started</button>
                            </div>

                            <div className="price-card pro">
                                <div className="popular-badge">⭐ POPULAR</div>
                                <h2 className="price-card-title">Pro</h2>
                                <div className="price-amount">$2.99<span style={{fontSize: '16px'}}>/mo</span></div>
                                <p className="price-period">or $19.99/year (save 33%)</p>
                                <ul className="price-list">
                                    <li>✓ Unlimited videos</li>
                                    <li>✓ 1080p export</li>
                                    <li>✓ 20+ filters</li>
                                    <li>✓ Unlimited music</li>
                                    <li>✓ Advanced effects</li>
                                    <li>✓ No ads</li>
                                </ul>
                                <button className="price-button pro" onClick={() => {
                                    setIsPro(true);
                                    setActiveTab('home');
                                }}>Start Free Trial</button>
                            </div>
                        </div>

                        <p style={{color: '#10b981', marginTop: '40px', fontSize: '16px'}}>✨ 7-day free trial • Cancel anytime • No credit card required</p>
                    </div>
                </div>
            );

            return (
                <div>
                    <div className="navbar">
                        <div className="navbar-content">
                            <div className="navbar-title">✨ faruSpark</div>
                            <div className="nav-buttons">
                                <button className={`nav-button ${activeTab === 'home' ? 'active' : ''}`} onClick={() => setActiveTab('home')}>Home</button>
                                <button className={`nav-button ${activeTab === 'editor' ? 'active' : ''}`} onClick={() => setActiveTab('editor')}>Editor</button>
                                {!isPro && (
                                    <button className="nav-button pro" onClick={() => setActiveTab('pricing')}>Go Pro</button>
                                )}
                                {isPro && <span style={{color: '#10b981', fontWeight: 'bold', fontSize: '13px'}}>⭐ Pro</span>}
                            </div>
                        </div>
                    </div>

                    {activeTab === 'home' && <HomeTab />}
                    {activeTab === 'editor' && <EditorTab />}
                    {activeTab === 'pricing' && <PricingTab />}

                    <div className="footer">
                        <p className="footer-text">Made with 💜 by faruSpark Team</p>
                        <p className="footer-subtext">© 2024 faruSpark • Start earning from your creativity!</p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<FaruSpark />, document.getElementById('root'));
    </script>
</body>
</html>

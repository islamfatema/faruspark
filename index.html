<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>faruSpark - Professional Video Editor</title>
<script src="https://js.stripe.com/v3/"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:linear-gradient(135deg,#0f172a,#6f21a8);color:#fff;min-height:100vh}
.navbar{background:linear-gradient(90deg,#1e293b,#6f21a8);border-bottom:3px solid #06b6d4;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:500}
.logo{font-size:22px;font-weight:bold;color:#06b6d4}
.nav{display:flex;gap:10px;align-items:center}
.nav button{background:none;border:none;color:#fff;cursor:pointer;padding:8px 12px;border-radius:6px;font-weight:500;font-size:13px}
.nav button:hover{color:#06b6d4}
.nav button.active{background:rgba(6,182,212,0.3);color:#06b6d4}
.pro-btn{background:linear-gradient(90deg,#ec4899,#f43f5e)!important;color:#fff!important}
.user-info{color:#06b6d4;font-size:12px}
.container{max-width:1400px;margin:0 auto;padding:20px}
.section{display:none}
.section.active{display:block}
h1{font-size:44px;color:#06b6d4;margin:20px 0;text-align:center}
h2{font-size:28px;color:#06b6d4;margin:20px 0}
p{color:#c084fc;margin:10px 0}
.btns{display:flex;gap:12px;justify-content:center;margin:30px 0;flex-wrap:wrap}
.btn{padding:12px 24px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px;transition:0.3s}
.btn:hover{transform:scale(1.05)}
.primary{background:linear-gradient(90deg,#06b6d4,#00d9ff);color:#0f172a}
.secondary{background:linear-gradient(90deg,#a855f7,#ec4899);color:#fff}
.tertiary{background:linear-gradient(90deg,#10b981,#14b8a6);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin:30px 0}
.card{border:2px solid #06b6d4;padding:20px;border-radius:12px;background:rgba(6,182,212,0.1);cursor:pointer;text-align:center;transition:0.3s}
.card:hover{transform:scale(1.08);border-color:#ec4899;background:rgba(236,72,153,0.1)}
.card-icon{font-size:40px;margin:10px 0}
.card-title{font-size:16px;font-weight:bold;color:#06b6d4}
.card-desc{font-size:12px;color:#c084fc}
.editor-container{background:linear-gradient(135deg,#1e293b,#4c1d95);padding:20px;border-radius:12px;border:2px solid #06b6d4;margin:20px 0}
.editor-top{display:flex;gap:15px;margin-bottom:20px}
.editor-tools{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
.tool-btn{background:rgba(6,182,212,0.2);border:1px solid #06b6d4;color:#06b6d4;padding:10px;border-radius:6px;cursor:pointer;font-weight:500;font-size:13px}
.tool-btn:hover{background:rgba(6,182,212,0.4)}
.preview{width:100%;height:400px;background:#000;border:2px solid #06b6d4;border-radius:8px;margin:20px 0;display:flex;align-items:center;justify-content:center}
video{max-width:100%;max-height:100%;border-radius:8px}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:20px 0}
.control-group{background:rgba(6,182,212,0.1);padding:12px;border-radius:8px;border:1px solid #06b6d4}
.control-label{font-size:12px;color:#c084fc;margin-bottom:5px}
input[type="range"]{width:100%;cursor:pointer}
.library{background:rgba(6,182,212,0.1);padding:15px;border-radius:8px;border:2px dashed #06b6d4;margin:15px 0}
.library-title{color:#06b6d4;font-weight:bold;margin-bottom:10px;font-size:14px}
.library-items{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;max-height:300px;overflow-y:auto}
.lib-item{background:rgba(6,182,212,0.2);padding:10px;border-radius:6px;cursor:pointer;text-align:center;border:1px solid #06b6d4;font-size:12px;transition:0.2s}
.lib-item:hover{background:rgba(236,72,153,0.3);border-color:#ec4899}
.locked{opacity:0.5;cursor:not-allowed}
.lock-icon{font-size:20px;margin:10px 0;color:#ec4899}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;overflow-y:auto}
.modal.active{display:flex}
.modal-content{background:linear-gradient(135deg,#1e293b,#4c1d95);padding:30px;border-radius:12px;max-width:500px;width:90%;border:2px solid #06b6d4;max-height:90vh;overflow-y:auto}
.modal-title{font-size:24px;color:#06b6d4;margin-bottom:20px;font-weight:bold}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;color:#c084fc;font-weight:500;font-size:13px}
.form-group input{width:100%;padding:10px;border:2px solid #06b6d4;border-radius:6px;background:rgba(0,0,0,0.3);color:#fff;font-size:13px}
.form-group input::placeholder{color:#999}
.form-group input:focus{outline:none;border-color:#ec4899}
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin:30px 0}
.price-card{border:3px solid #06b6d4;padding:25px;border-radius:12px;background:linear-gradient(135deg,#1e3a1f,#134e4a);text-align:center}
.price-card.pro{background:linear-gradient(135deg,#7c2d12,#5b21b6);border-color:#ec4899;transform:scale(1.05)}
.price-card h3{font-size:24px;margin:10px 0}
.price-amount{font-size:36px;font-weight:bold;color:#fbbf24;margin:15px 0}
.price-card.pro .price-amount{color:#06b6d4}
.price-list{text-align:left;list-style:none;margin:15px 0;font-size:13px}
.price-list li{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.price-list li:before{content:'✓ ';color:#10b981;margin-right:8px}
.trial-badge{background:#10b981;color:#fff;padding:8px 12px;border-radius:6px;font-size:11px;font-weight:bold}
.footer{background:linear-gradient(90deg,#0f172a,#4c1d95);border-top:3px solid #ec4899;padding:30px 20px;text-align:center;margin-top:60px}
.status-msg{padding:15px;border-radius:8px;margin:15px 0;text-align:center;font-weight:bold}
.success{background:#10b981;color:#fff}
.error{background:#ef4444;color:#fff}
.warning{background:#f59e0b;color:#fff}
.close-modal{float:right;font-size:24px;cursor:pointer;color:#06b6d4}
.close-modal:hover{color:#ec4899}
@media(max-width:768px){
.navbar{flex-direction:column;gap:10px}
.nav{flex-wrap:wrap;justify-content:center}
h1{font-size:32px}
.grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
.editor-top{flex-direction:column}
.preview{height:250px}
.price-card.pro{transform:scale(1.02)}
}
</style>
</head>
<body>

<div class="logo">✨ faruSpark Pro</div>
<div class="nav">
<button class="active" onclick="nav('home')">Home</button>
<button onclick="nav('editor')">Editor</button>
<button onclick="nav('features')">Features</button>
<button class="pro-btn" onclick="nav('pricing')">Pricing</button>

</div>
